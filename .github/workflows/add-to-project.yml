# Auto-add newly opened issues to the free-actions-core Kanban board.
# Activate by: set repo variable ENABLE_PROJECT_AUTOMATION=true and add a
# PROJECT_PAT secret (a fine-grained PAT with "Projects: read & write").
# (The built-in Project "Auto-add" workflow in Project settings is a
#  no-secret alternative if you prefer.)
name: Add issues to project

on:
  issues:
    types: [opened, reopened]

permissions:
  contents: read

jobs:
  add-to-project:
    if: ${{ vars.ENABLE_PROJECT_AUTOMATION == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/users/chisakiShinichirouToshiyuki/projects/26
          github-token: ${{ secrets.PROJECT_PAT }}
