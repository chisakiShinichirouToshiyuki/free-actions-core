name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: lint · typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - name: Install (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Lint (Biome, warnings fail)
        run: bun x biome ci src/ --error-on-warnings

      - name: Typecheck (strict, src + type-level tests)
        run: bun run typecheck

      - name: Type coverage (regression floor; zod sets the residual)
        run: bun run type-coverage

      - name: Test + property tests + coverage gate (100%)
        run: bun run test:coverage

      - name: Build
        run: bun run build

      - name: Published-types check (attw)
        run: bun run attw
