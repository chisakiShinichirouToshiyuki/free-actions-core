# AI PR review by Claude (anthropics/claude-code-action).
# Dormant until activated: set repo variable ENABLE_CLAUDE_REVIEW=true and add
# the ANTHROPIC_API_KEY secret. NOTE: unlike CodeRabbit (free for OSS), this
# consumes paid Anthropic API tokens when it runs.
name: Claude Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    if: ${{ vars.ENABLE_CLAUDE_REVIEW == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: >-
            Review this PR. Focus on: correctness bugs; security (secret
            handling, that no shared token / upstream URL is hard-coded, trust
            boundaries are zod-validated); and adherence to the strict lint/type
            rules (no any, no non-null assertion, no console). Be concise and
            only flag high-confidence issues.
